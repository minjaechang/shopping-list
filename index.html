<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping List</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
    <script
      src="https://kit.fontawesome.com/fe3cdc0ee7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section class="list">
      <header class="header">Shopping List</header>
      <ul class="items">
        <li class="item">
        </li>
      </ul>
      <form class="form">
        <input type="text" class="form__input" placeholder="Add item!">
        <button class="form__button" type="submit"><i class="fas fa-plus"></i></button>
      <form/>
    </section>
  </body>
</html>
